packages:
  - "."

savePrefix: "~"
minimumReleaseAge: 10080 # one week in minutes

# Empêche pnpm de purger interactivement node_modules au runtime (TTY-less).
# Sans ça, `pnpm start` sur Scalingo plante avec ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY
# si pnpm détecte une discrepancy entre node_modules installé et la config courante.
confirmModulesPurge: false

# Empêche pnpm de relancer une install (vérification des deps) avant `pnpm <script>`.
# Sans ça, lancer un script ops dans un conteneur one-off Scalingo déclenche un
# `pnpm install` complet qui OOM (SIGKILL). Permet de lancer les scripts via
# `pnpm <script>` de manière identique en local et sur Scalingo.
verifyDepsBeforeRun: false
minimumReleaseAgeExclude:
  - next
  - "@next/env"
  - "@next/swc-darwin-arm64"
  - "@next/swc-darwin-x64"
  - "@next/swc-linux-x64-gnu"
  - "@next/swc-linux-x64-musl"
  - "@next/swc-linux-arm64-gnu"
  - "@next/swc-linux-arm64-musl"
  - "@next/swc-win32-x64-msvc"
  - "@next/swc-win32-arm64-msvc"

trustPolicy: no-downgrade

overrides:
  # Force vite patché pour CVE path traversal / fs.deny bypass
  # (transitif via vitest + @vitejs/plugin-react)
  vite: "^7.3.2"
  # CVE path traversal arbitrary file write (transitif via vite)
  rollup: "^4.59.0"
  # ReDoS (transitif via eslint, drizzle-kit, etc.)
  minimatch: "^9.0.7"
  # Prototype pollution / unbounded recursion (transitif via eslint)
  flatted: "^3.4.2"
  # ReDoS / method injection (transitif via eslint-config-next et vite)
  picomatch: "^4.0.4"
  # Zero-step sequence ReDoS (transitif via minimatch)
  brace-expansion: "^2.0.3"
  # Prototype pollution via merge (transitif via eslint)
  js-yaml: "^4.1.1"
  # ReDoS $data (transitif via eslint)
  ajv: "^6.14.0"
  # Arbitrary requests via dev server (transitif via drizzle-kit)
  # NB: CVE Deno binary-integrity (<0.28.1) non-exploitable en Node ; bump vers ^0.28.1
  # bloqué par minimumReleaseAge (0.28.1 publié le 2026-06-11) jusqu'au 2026-06-18.
  esbuild: "^0.25.0"
  # Path traversal via prefix/postfix non assainis (transitif via exceljs)
  tmp: "^0.2.6"

trustPolicyExclude:
  # Types-only, runtime-safe. Voir https://github.com/nodejs/undici/issues/4666
  - undici-types
  # semver@6.x n'a plus de provenance attestation ; transitif via @babel/core
  # (dépendance dev-only de @vitejs/plugin-react) — pas de risque runtime
  - semver
  # Faux positif "trust downgrade" apparu avec pnpm 11.4.0 : provenance attestation
  # absente sur la 3.10.x. Package légitime (mainteneurs jounqin / typescript-eslint,
  # publié depuis 2017), dev-only — résolution d'imports TS pour eslint-plugin-import.
  - eslint-import-resolver-typescript

# Approbation explicite des scripts d'install natif (pnpm 11+).
# Note : remplace `onlyBuiltDependencies` (ancien mécanisme pnpm 9-10, ignoré en 11).
allowBuilds:
  argon2: true
  esbuild: true
  sharp: true
  unrs-resolver: true
